<!DOCTYPE html>
<html>
    <head>
            <link rel="stylesheet" href="./style.css?v=3">
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
            
            <script src="https://cdn.jsdelivr.net/npm/lottie-web@5.13.0/build/player/lottie.min.js"></script>
            <script src="./script.js?v=17"></script>

            
            
            <meta name="viewport" content="width=device-width, initial-scale=1.0">

    </head>
    <body>
        <div id="sticker-container"></div>

        <div class="container_firstmeet">
            <div class="ubuntu-bold">
                Подарок Софушке, на её 16 день рождения!
            </div>
            <div class="description ubuntu-regular">
                да
            </div>
            
            <button class="continue_btt ubuntu-bold" onclick="continue_gift()">
                Продолжить
            </button>
        </div>

        <div class="main-container ubuntu-bold">
            <div class="title">Адвент-Календарь</div>
            
            <div class="day-controler">
                <button class="button-change-day" id="button-change-day-previous" onclick="changeDay(-1)"><</button>
                <div class="center-container">
                    <button class="gift" style="border: 0px solid; cursor: pointer;" onclick="openGift()">
                        <video class="giftAnimation" autoplay loop muted playsinline width="100%">
                            <source src="./animations/idle.webm" type="video/webm">
                            <source src="./animations/idle.mp4" type="video/mp4; codecs=hevc">
                            Ваш браузер не поддерживает тег видео.
                        </video>
                        <img class="giftImage" width="60%" style="margin-top: -250px;" src="pngs/opened idle.png">

                    </button>
                    

                    <div id="day_number">
                        <div id="day">1</div> 
                        <div id="text">День</div>
                    </div>
                </div>
                <button class="button-change-day" id="button-change-day-next" onclick="changeDay(1)">></button>
            </div>
            
        </div>

        <div class="fixed-bottom restart-animations">

            <button onclick="restartAnimations()" class="restartBtt"> Перезапустить всё сначала</button>
        </div>



    </body>
</html>
