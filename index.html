<!DOCTYPE html>
<html>
    <head>
            <link rel="stylesheet" href="./style.css?v=3">
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
            
            <script src="https://cdn.jsdelivr.net/npm/lottie-web@5.13.0/build/player/lottie.min.js"></script>
            <script src="./script.js?v=p-1/v-81"></script>

            
            
            <meta name="viewport" content="width=device-width, initial-scale=1.0">

    </head>
    <body>
        <div class="hover hidden">
            <div id="title">
                Loading...
            </div>
        </div>

        <div class="gift-open-menu hidden">
            <div id="header">
                <div id="gift-sticker-container"></div>
            </div>
            <div id="main" class="ubuntu-regular">
                <div class="circle-video ">
                    <video id="circle-video" src="./videos/test_video_1.mp4" playsinline style="height: 200px; border-radius: 100px;" onclick="playCircleVideo()"></video>
                    <div class="circle-video-time">
                        01/07
                    </div>
                    <div id="video-control">
                        <div id="buttonToTheStart" onclick="cv_toTheStart()">⏮</div>
                        <div id="buttonToTheStart" onclick="cv_back()">◀</div>
                        <div id="buttonToTheStart" onclick="cv_next()">▶</div>
                    </div>
                    </div>

                <div class="compliment">
                    <div class="ubuntu-regular" id="pre-text">
                        Тут комплимент для тебя!
                    </div>
                    <div class="secret-container">
                        <div class="ubuntu-bold" id="text">
                            Ты у меня самая лучшая!
                        </div>
                        <div id="hover" onclick="openCompliment()">
                            Нажми, чтобы открыть 🎁
                        </div>
                    </div>
                </div>
                <div class="giftCard">
                    <div class="ubuntu-regular" id="pre-text">
                        И открыточка!
                    </div>
                    <div class="secret-container">
                        <div id="giftCard">
                            <img id="giftCardImg" src="./pngs/giftCards/1.jpg" height="240px">
                        </div>
                        <div id="hoverGiftCard" onclick="openGiftCard()">
                            Нажми, чтобы открыть 🎁
                        </div>
                    </div>
                </div>
            </div>

                
            </div>
            <div id="footer">
                С Днём Рождения! 🎉
            </div>
        </div>

        <div id="sticker-container"></div>

        <div class="container_firstmeet">
            <div class="ubuntu-bold">
                Подарок Софушке, на её 16 день рождения!
            </div>
            <div class="description ubuntu-regular">
                да
            </div>
            
            <button class="continue_btt ubuntu-bold" onclick="continue_gift()">
                Продолжить
            </button>
        </div>

        <div class="main-container ubuntu-bold">
            <div class="title">Адвент-Календарь</div>
            
            <div class="day-controler">
                <button class="button-change-day" id="button-change-day-previous" onclick="changeDay(-1)"><</button>
                <div class="center-container">
                    <button class="gift" style="border: 0px solid; cursor: pointer;" onclick="openGift()">
                        <video class="giftAnimation" autoplay loop muted playsinline width="100%">
                            <source src="./animations/idle.webm" type="video/webm">
                            <source src="./animations/idle.mp4" type="video/mp4; codecs=hevc">
                            Ваш браузер не поддерживает тег видео.
                        </video>
                    </button>
                    

                    <div id="day_number">
                        <div id="day">1</div> 
                        <div id="text">День</div>
                    </div>
                </div>
                <button class="button-change-day" id="button-change-day-next" onclick="changeDay(1)">></button>
            </div>
            
        </div>

        <div class="fixed-bottom restart-animations">

            <button onclick="restartAnimations()" class="restartBtt"> Перезапустить всё сначала</button>
        </div>



    </body>
</html>
